apiVersion: apps/v1
kind: Deployment
metadata:
  name: vit-api
  labels:
    app: vit-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vit-api
  template:
    metadata:
      labels:
        app: vit-api
    spec:
      containers:
        - name: vit-api
          # replace <ACR_NAME> with your registry
          image: <ACR_NAME>.azurecr.io/vit-api:v1
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_TYPE
              value: "huggingface"   # or "pytorch"
            - name: TOP_K
              value: "5"
            # pytorch mode only:
            # - name: NUM_CLASSES
            #   value: "10"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "3Gi"
            # GPU node pool: add under limits ->  nvidia.com/gpu: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
